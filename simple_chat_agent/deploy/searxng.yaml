apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-harness-searxng-config
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-searxng
data:
  settings.yml: |
    use_default_settings: true

    general:
      debug: false
      instance_name: "Agent Harness Search"
      enable_metrics: false

    search:
      safe_search: 1
      autocomplete: ""
      formats:
        - json

    server:
      port: 8080
      bind_address: "0.0.0.0"
      secret_key: "agent-harness-internal-searxng"
      limiter: false
      image_proxy: false
      method: "GET"

    outgoing:
      request_timeout: 4.0
      max_request_timeout: 8.0
      useragent_suffix: "temporal-agent-harness"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-searxng
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-searxng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-harness-searxng
  template:
    metadata:
      labels:
        app: agent-harness-searxng
    spec:
      automountServiceAccountToken: false
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SEARXNG_BASE_URL
              value: http://agent-harness-searxng.temporal-michaelj-agent-harness-demo.svc.cluster.local:8080/
            - name: SEARXNG_PORT
              value: "8080"
            - name: SEARXNG_BIND_ADDRESS
              value: 0.0.0.0
          volumeMounts:
            - name: searxng-config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
              readOnly: true
            - name: searxng-cache
              mountPath: /var/cache/searxng
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: searxng-config
          configMap:
            name: agent-harness-searxng-config
        - name: searxng-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-searxng
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-searxng
spec:
  type: ClusterIP
  selector:
    app: agent-harness-searxng
  ports:
    - name: http
      port: 8080
      targetPort: 8080
