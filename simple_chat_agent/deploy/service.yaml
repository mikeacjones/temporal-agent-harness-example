# Both Services select the same pod; the web Service targets the web
# container's port (8000) and the codec Service targets the worker container's
# in-process codec port (8001).
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-web
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
spec:
  type: ClusterIP
  selector:
    app: agent-harness
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-codec
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
spec:
  type: ClusterIP
  selector:
    app: agent-harness
  ports:
    - name: codec
      port: 80
      targetPort: 8001
