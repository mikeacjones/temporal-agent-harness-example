# Independent web and worker Deployments for the simple_chat_agent.
#
# All shared state is now external (S3 claim-checks + artifacts, DynamoDB
# OAuth/artifact metadata, web-owned HTTP streaming), so the two no longer share
# a pod or any local volume. Each container keeps a small emptyDir for SQLite
# scratch (transient OAuth handshake state, etc.).
#
# - web: serves the UI + the internal stream API; owns the in-memory stream
#        buffer, so it stays at a single replica (scaling needs a shared
#        backplane, e.g. Redis).
# - worker: Temporal worker + in-process codec; horizontally scalable (the codec
#           reads claim-checks from S3, so any worker pod can decode).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-web
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
    component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-harness
      component: web
  template:
    metadata:
      labels:
        app: agent-harness
        component: web
    spec:
      serviceAccountName: agent-harness
      containers:
        - name: web
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:1.0
          imagePullPolicy: IfNotPresent
          # The module's __main__ binds 127.0.0.1 with reload=True (dev only),
          # so launch uvicorn directly bound to all interfaces.
          command:
            - uvicorn
            - simple_chat_agent.api.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --proxy-headers
            - --forwarded-allow-ips
            - "*"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: agent-harness-secrets
          env:
            - name: SIMPLE_CHAT_S3_BUCKET
              value: michaelj-agent-harness-claimcheck-429214323166
            - name: SIMPLE_CHAT_USER_EMAIL_SEARCH_ATTR
              value: UserEmail
            - name: SIMPLE_CHAT_DYNAMODB_TABLE
              value: temporal-michaelj-agent-harness-demo-oauth
            - name: SIMPLE_CHAT_STREAM_SINK_URL
              value: http://agent-harness-web
            - name: SIMPLE_CHAT_ARTIFACTS_TABLE
              value: temporal-michaelj-agent-harness-demo-artifacts
          volumeMounts:
            - name: chat-data
              mountPath: /app/.simple_chat_agent
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: chat-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-worker
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-harness
      component: worker
  template:
    metadata:
      labels:
        app: agent-harness
        component: worker
    spec:
      serviceAccountName: agent-harness
      containers:
        - name: worker
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:1.0
          imagePullPolicy: IfNotPresent
          # Runs the Temporal worker and the in-process codec server (:8001).
          command:
            - python
            - -m
            - simple_chat_agent.worker.main
          ports:
            - name: codec
              containerPort: 8001
          envFrom:
            - secretRef:
                name: agent-harness-secrets
          env:
            - name: SIMPLE_CHAT_S3_BUCKET
              value: michaelj-agent-harness-claimcheck-429214323166
            - name: SIMPLE_CHAT_USER_EMAIL_SEARCH_ATTR
              value: UserEmail
            - name: SIMPLE_CHAT_DYNAMODB_TABLE
              value: temporal-michaelj-agent-harness-demo-oauth
            - name: SIMPLE_CHAT_STREAM_SINK_URL
              value: http://agent-harness-web
            - name: SIMPLE_CHAT_ARTIFACTS_TABLE
              value: temporal-michaelj-agent-harness-demo-artifacts
          volumeMounts:
            - name: chat-data
              mountPath: /app/.simple_chat_agent
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: chat-data
          emptyDir: {}
