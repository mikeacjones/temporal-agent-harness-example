# ServiceAccount bound (via IRSA) to the IAM role that grants S3 access to the
# claim-check bucket. The role's trust policy restricts it to exactly this
# namespace + ServiceAccount.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-harness
  namespace: temporal-michaelj-agent-harness-demo
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::429214323166:role/temporal-michaelj-agent-harness-demo-s3
