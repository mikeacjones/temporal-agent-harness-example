# Real Let's Encrypt certs for the web and codec hosts, issued automatically by
# the cluster's `letsencrypt` ClusterIssuer (cert-manager). Mirrors how the
# other demos on this cluster (e.g. fly.tmprl-demo.cloud) get valid TLS.
#
# A valid cert matters most for the codec host: the Temporal Cloud Web UI calls
# it from the browser, so a self-signed cert would be rejected.
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-harness-demo-tls
  namespace: temporal-michaelj-agent-harness-demo
spec:
  dnsNames:
    - agent-harness-demo.tmprl-demo.cloud
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    rotationPolicy: Always
  secretName: agent-harness-demo-tls
---
# Pre-issued wildcard cert copied into disposable demo workspace namespaces.
# Workspace hosts are single-label subdomains under tmprl-demo.cloud,
# e.g. demo-user-abc-agent-harness-demo.tmprl-demo.cloud.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: agent-harness-workspace-tls
  namespace: temporal-michaelj-agent-harness-demo
spec:
  dnsNames:
    - "*.tmprl-demo.cloud"
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    rotationPolicy: Always
  secretName: agent-harness-workspace-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: codec-agent-harness-demo-tls
  namespace: temporal-michaelj-agent-harness-demo
spec:
  dnsNames:
    - codec.agent-harness-demo.tmprl-demo.cloud
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: letsencrypt
  privateKey:
    rotationPolicy: Always
  secretName: codec-agent-harness-demo-tls
