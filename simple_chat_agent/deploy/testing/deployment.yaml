# Isolated TEST stack (branch preview), in the same namespace as prod.
#
# Separate web + worker Deployments labelled `app: agent-harness-testing` so the
# prod Services never select these pods. Isolation in the shared namespace comes
# from SIMPLE_CHAT_TASK_QUEUE (own queue) + SIMPLE_CHAT_WORKFLOW_PREFIX (own
# registry ids). The test worker streams to the test web. Backends (S3,
# DynamoDB, secret, Temporal namespace) are shared with prod.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-web-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
    component: web
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: agent-harness-testing
      component: web
  template:
    metadata:
      labels:
        app: agent-harness-testing
        component: web
    spec:
      serviceAccountName: agent-harness
      containers:
        - name: web
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:testing
          imagePullPolicy: IfNotPresent
          command:
            - uvicorn
            - simple_chat_agent.api.main:app
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --proxy-headers
            - --forwarded-allow-ips
            - "*"
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: agent-harness-secrets
          env:
            - name: SIMPLE_CHAT_S3_BUCKET
              value: michaelj-agent-harness-claimcheck-429214323166
            - name: SIMPLE_CHAT_USER_EMAIL_SEARCH_ATTR
              value: UserEmail
            - name: SIMPLE_CHAT_DYNAMODB_TABLE
              value: temporal-michaelj-agent-harness-demo-oauth
            - name: SIMPLE_CHAT_ARTIFACTS_TABLE
              value: temporal-michaelj-agent-harness-demo-artifacts
            # --- test isolation ---
            - name: SIMPLE_CHAT_TASK_QUEUE
              value: simple-chat-agent-testing
            - name: SIMPLE_CHAT_WORKFLOW_PREFIX
              value: testing-
            - name: SIMPLE_CHAT_STREAM_SINK_URL
              value: http://agent-harness-web-testing
          volumeMounts:
            - name: chat-data
              mountPath: /app/.simple_chat_agent
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: chat-data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-harness-worker-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-harness-testing
      component: worker
  template:
    metadata:
      labels:
        app: agent-harness-testing
        component: worker
    spec:
      serviceAccountName: agent-harness-worker-testing
      containers:
        - name: worker
          image: 429214323166.dkr.ecr.us-west-1.amazonaws.com/temporal-michaelj-agent-harness-demo:testing
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - simple_chat_agent.worker.main
          ports:
            - name: codec
              containerPort: 8001
          envFrom:
            - secretRef:
                name: agent-harness-secrets
          env:
            - name: SIMPLE_CHAT_S3_BUCKET
              value: michaelj-agent-harness-claimcheck-429214323166
            - name: SIMPLE_CHAT_USER_EMAIL_SEARCH_ATTR
              value: UserEmail
            - name: SIMPLE_CHAT_DYNAMODB_TABLE
              value: temporal-michaelj-agent-harness-demo-oauth
            - name: SIMPLE_CHAT_ARTIFACTS_TABLE
              value: temporal-michaelj-agent-harness-demo-artifacts
            # --- test isolation ---
            - name: SIMPLE_CHAT_TASK_QUEUE
              value: simple-chat-agent-testing
            - name: SIMPLE_CHAT_WORKFLOW_PREFIX
              value: testing-
            - name: SIMPLE_CHAT_STREAM_SINK_URL
              value: http://agent-harness-web-testing
            - name: PYTHON_SANDBOX_LAMBDA_FUNCTION
              value: temporal-michaelj-agent-harness-demo-python-sandbox-testing
            - name: PYTHON_SANDBOX_STREAM_SINK_URL
              value: https://agent-harness-demo.testing.tmprl-demo.cloud
          volumeMounts:
            - name: chat-data
              mountPath: /app/.simple_chat_agent
          readinessProbe:
            tcpSocket:
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: chat-data
          emptyDir: {}
