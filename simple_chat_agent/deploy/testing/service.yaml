# Test web Service (selects only the test web pods). The test worker streams to
# this Service name (SIMPLE_CHAT_STREAM_SINK_URL=http://agent-harness-web-testing).
apiVersion: v1
kind: Service
metadata:
  name: agent-harness-web-testing
  namespace: temporal-michaelj-agent-harness-demo
  labels:
    app: agent-harness-testing
spec:
  type: ClusterIP
  selector:
    app: agent-harness-testing
    component: web
  ports:
    - name: http
      port: 80
      targetPort: 8000
