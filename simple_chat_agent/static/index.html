<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Simple Chat Agent</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+Mono:wght@400;500;600&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/static/app.css" />
    </head>
    <body>
        <section class="login-screen" id="loginScreen" hidden>
            <div class="login-card">
                <h1
                    class="brand-mark login-brand"
                    aria-label="Simple Chat Agent"
                ></h1>
                <p class="login-subtitle" id="loginSubtitle"></p>
                <div class="login-form">
                    <a
                        class="login-google"
                        id="loginGoogle"
                        href="/oauth/google/start"
                        >Log In</a
                    >
                    <p class="login-error" id="loginError"></p>
                </div>
            </div>
        </section>
        <div class="app" id="appRoot" hidden>
            <header>
                <div class="header-left">
                    <h1 class="brand-mark" aria-label="Simple Chat Agent"></h1>
                    <a
                        class="temporal-link"
                        id="temporalLink"
                        href="#"
                        target="_blank"
                        rel="noreferrer"
                        >Temporal UI</a
                    >
                </div>
                <div class="side-panel">
                    <section class="side-section">
                        <div class="side-actions">
                            <button class="primary" type="button" id="newChat">
                                New Chat
                            </button>
                            <button type="button" id="toolsButton">
                                Tools
                            </button>
                            <button type="button" id="logout">Logout</button>
                        </div>
                    </section>
                    <section class="side-section">
                        <p class="side-section-title">Agent</p>
                        <div class="agent-settings">
                            <div class="agent-field">
                                <label for="modelSelect">Model</label>
                                <select id="modelSelect"></select>
                            </div>
                            <label class="agent-toggle" for="thinkingEnabled">
                                <input id="thinkingEnabled" type="checkbox" />
                                Extended thinking
                            </label>
                            <div class="agent-field" id="thinkingBudgetField">
                                <label for="thinkingBudget"
                                    >Budget tokens</label
                                >
                                <input
                                    id="thinkingBudget"
                                    type="number"
                                    min="1024"
                                    step="1024"
                                />
                            </div>
                            <div class="agent-field" id="thinkingEffortField">
                                <label for="thinkingEffort">Effort</label>
                                <select id="thinkingEffort"></select>
                            </div>
                        </div>
                    </section>
                    <section class="side-section">
                        <p class="side-section-title">Chats</p>
                        <div id="conversationList"></div>
                    </section>
                </div>
                <div class="status" id="status">connecting...</div>
            </header>
            <main>
                <section class="messages" id="messages">
                    <div class="empty">Starting a Temporal workflow...</div>
                </section>
                <aside class="sidebar">
                    <p class="events-title">Sideband Stream</p>
                    <div id="events"></div>
                </aside>
            </main>
            <aside class="artifacts-sidebar" id="artifactsSidebar"></aside>
            <form class="composer" id="composer">
                <textarea
                    id="message"
                    placeholder="Type to chat. While responding, Send becomes steering."
                ></textarea>
                <button class="primary" type="submit">Send</button>
                <a
                    class="temporal-link"
                    id="chatWorkflowLink"
                    href="#"
                    target="_blank"
                    rel="noreferrer"
                    >Workflow</a
                >
                <button type="button" id="interrupt">Interrupt</button>
            </form>
            <section class="tools-overlay" id="toolsOverlay" hidden>
                <div
                    class="tools-window"
                    role="dialog"
                    aria-modal="true"
                    aria-labelledby="toolsWindowTitle"
                >
                    <div class="tools-window-header">
                        <div class="tools-window-title" id="toolsWindowTitle">
                            Tools
                        </div>
                        <button type="button" id="closeTools">Close</button>
                    </div>
                    <div class="tools-window-body" id="toolsWindowBody"></div>
                </div>
            </section>
            <section
                class="artifact-viewer-overlay"
                id="artifactViewerOverlay"
                hidden
            ></section>
        </div>
        <script src="/static/app.js"></script>
    </body>
</html>
